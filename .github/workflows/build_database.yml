name: Weekly Database Builder

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at 00:00 UTC
  workflow_dispatch:

concurrency:
  group: database-build
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Cache Pub Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Dependencies
        run: dart pub get

      - name: Static Code Analysis
        run: dart analyze

      - name: Crawl MyScheme
        run: dart run bin/crawl_myscheme.dart

      - name: Build Master Dataset
        run: dart run bin/build_master_dataset.dart

      - name: Build SQLite Database
        run: dart run bin/build_database.dart

      - name: Commit and Push Database Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/generated/*.json data/processed/schemes_master.json data/output/schemes.db
          if git diff --cached --quiet; then
            echo "No dataset changes to commit."
          else
            git commit -m "automated: weekly schemes database update [skip ci]"
            # The crawl takes a while; main may have moved since checkout.
            # Rebase our data commit on the latest main before pushing.
            git pull --rebase origin main
            git push origin main
          fi
