name: government_scheme_db_builder
description: >-
  Builds an offline SQLite database of Indian government schemes by crawling
  official portals (MyScheme, india.gov.in and state portals), then
  extracting, normalizing, validating and de-duplicating the data.
version: 2.0.0
repository: https://github.com/neerjaRaju/myschemedbbuilder

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  crypto: ^3.0.3
  html: ^0.15.4
  http: ^1.2.0
  sqlite3: ^2.4.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.25.2
